function localizeCellValue(str, lang) {
  if (typeof str !=='string') return str;
  const dict = CELL_TRANSLATIONS[lang];
  if (!dict) return str;
  // Sort longest-first so multi-word phrases match before their substrings.
  if (!dict.__sortedKeys) {
    Object.defineProperty(dict,'__sortedKeys', { value: Object.keys(dict).filter(k => k !=='__sortedKeys').sort((a, b) => b.length - a.length), enumerable: false });
  }
  let result = str;
  for (const k of dict.__sortedKeys) {
    if (!result.includes(k)) continue;
    const escaped = k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    result = result.replace(new RegExp(escaped,'g'), dict[k]);
  }
  return result;
}

// ─── Cell value renderer ─────────────────────────────────────────────────────
// Find any "<number> <currency-unit>" within a string and replace with the user's
// selected currency. Handles "kr" (DKK from DK or SEK/NOK if hint set), "SEK", "NOK",
// "DKK", "EUR", "€". Source currency for ambiguous "kr" is taken from `sourceHint`
// (the country the bank operates in); explicit codes override.
const MONEY_GLOBAL_RE = /(\d[\d.,]*)\s*(€|kr|SEK|NOK|DKK|EUR)(?!\w)/gi;
const COUNTRY_TO_CURRENCY = { DK:'DKK', SE:'SEK', NO:'NOK', FI:'EUR'};

function convertMoneyString(str, currency, sourceHint) {
  if (typeof str !=='string') return str;
  const target = CURRENCY_BY_CODE[currency] || CURRENCY_BY_CODE[DEFAULT_CURRENCY];
  return str.replace(MONEY_GLOBAL_RE, (match, numStr, unitRaw) => {
    const num = parseFloat(numStr.replace(/\./g,'').replace(',','.'));
    if (isNaN(num)) return match;
    const u = unitRaw.toUpperCase();
    let sourceCode;
    if (u ==='KR') sourceCode = sourceHint ||'DKK';
    else if (u ==='€') sourceCode ='EUR';
    else sourceCode = u;
    if (!CURRENCY_BY_CODE[sourceCode]) return match;
    // Convert source -> DKK -> target. Stored rate is DKK->X, so inverse for X->DKK.
    const dkk = num / CURRENCY_BY_CODE[sourceCode].rate;
    const converted = fmtMoneyPlain(dkk, currency);
    return target.prefix ? `${target.symbol}${converted}` : `${converted} ${target.symbol}`;
  });
}

const ROW_SLIDER_CONFIG = {
  domestic_included:    { key:'txMonth',        min: 0,  max: 500,  step: 10, unit:'stk/md'},
  intl_transfer:        { key:'intlPerMonth',   min: 0,  max: 50,   step: 1,  unit:'stk/md'},
  fx_fee:               { key:'fxVolume',       min: 0,  max: 100,  step: 5,  unit:'k DKK/md'},
  payroll:              { key:'payrollPerMo',   min: 0,  max: 50,   step: 1,  unit:'ans/md'},
  physical_card_extra:  { key:'physCardsNeeded', min: 1, max: 20,   step: 1,  unit:'kort' },
};

function InlineSlider({ rowId, answers, setAnswers }) {
  const cfg = ROW_SLIDER_CONFIG[rowId];
  if (!cfg) return null;
  const val = answers[cfg.key] ?? cfg.min;
  const pct = ((val - cfg.min) / (cfg.max - cfg.min)) * 100;
  return (
    <div className="inline-slider-wrap">
      <input
        type="range"
        className="inline-slider"
        min={cfg.min} max={cfg.max} step={cfg.step}
        value={val}
        style={{'--pct': pct +'%'}}
        onChange={e => setAnswers(a => ({ ...a, [cfg.key]: +e.target.value }))}
      />
      <span className="inline-slider-val">{val} {cfg.unit}</span>
    </div>
  );
}

function CellVal({ val, currency, sourceCurrency, lang }) {
  if (Array.isArray(val)) {
    if (!val.length) return <span className="dash-val">—</span>;
    return (
      <div className="feature-chips">
        {val.map((f, i) => {
          const label = localizeCellValue(f.label, lang);
          return (
            <span key={i} className={`feature-chip tone-${f.tone ||'neutral'}`} title={label}>
              <span className="feature-chip-label">{label}</span>
            </span>
          );
        })}
      </div>
    );
  }
  if (!val || val ==='—') return <span className="dash-val">—</span>;
  if (typeof val ==='string' && val.includes('\n')) {
    const parts = val.split('\n');
    return <span>{parts.map((p, i) => <span key={i}>{i > 0 && <br/>}<CellVal val={p} currency={currency} sourceCurrency={sourceCurrency} lang={lang} /></span>)}</span>;
  }
  // Localize Danish/Swedish/Norwegian/Finnish phrases into the active UI language.
  const localized = typeof val ==='string'? localizeCellValue(val, lang) : val;
  if (localized ==='Ja'|| localized ==='Yes') return <span className="yes-val">{localized}</span>;
  if (localized ==='Nej'|| localized ==='No') return <span className="no-val">{localized}</span>;
  // Convert any money-formatted strings (e.g. "100 SEK", "12,90 €", "100 kr") into the selected currency.
  // sourceCurrency disambiguates "kr" (could be DKK/SEK/NOK depending on the bank's home market).
  const converted = typeof localized ==='string'? convertMoneyString(localized, currency, sourceCurrency) : localized;
  return <>{converted}</>;
}

// ─── Cost helpers ────────────────────────────────────────────────────────────
function parseKr(str) {
  if (!str || typeof str !=='string') return 0;
  if (/gratis|inkl|ja/i.test(str)) return 0;
  if (str ==='—' || /nej/i.test(str)) return 0;
  const m = str.match(/([\d.,]+)/);
  return m ? parseFloat(m[1].replace('.','').replace(',','.')) : 0;
}

// Pull a per-year value from a range answer. year=1 → low end, year=2 → high end.
// If the answer is a scalar, it's used for both years.
function valueForYear(answer, year) {
  if (Array.isArray(answer)) return year === 2 ? answer[1] : answer[0];
  return answer ?? 0;
}

function computeAnnualCost(pkg, answers, year) {
  const p = computeCostBreakdown(pkg, answers, year);
  return p.annual;
}

// Shared parsing helpers — used by both the per-row cost estimate (oversigt cell
// subtitle) AND the bottom chart so they stay in lock-step. Strings like
// "5 gratis/md · derefter 20 kr/stk" must extract the FREE quota (5) and the
// per-tx overage fee (20), not just the first number.
function domesticMonthlyTxCost(pkg, txMonth) {
  const s = pkg.domestic_transfer ||'';
  if (/ubegrænset.*gratis|gratis.*ubegrænset/i.test(s)) return 0;
  const freeM = s.match(/(\d[\d.]*)\s*gratis/i);
  const freeCount = freeM ? parseInt(freeM[1].replace(/\./g,'')) : 0;
  const perTxM = s.match(/derefter\s*~?([\d,]+)\s*kr/i) || s.match(/^([\d,]+)\s*kr/i);
  const perTx = perTxM ? parseFloat(perTxM[1].replace(',','.')) : (pkg._transfer || 0);
  return Math.max(0, (txMonth || 0) - freeCount) * perTx;
}

function intlMonthlyTxCost(pkg, intlPerMonth) {
  const s = pkg.intl_transfer ||'';
  if (/forhandlet/i.test(s)) return 0;
  if (/^gratis$|^kun\s+fx|\b0\s*kr\b|gratis.*SWIFT/i.test(s) && !/derefter/i.test(s)) return 0;
  const freeM = s.match(/(\d+)\s*gratis/i);
  const free = freeM ? parseInt(freeM[1]) : 0;
  const costM = s.match(/derefter\s*~?([\d,]+)\s*kr/i) || s.match(/~?([\d,]+)\s*kr(?:\s*\(SWIFT\))?/i);
  const costPer = costM ? parseFloat(costM[1].replace(',','.')) : (pkg._intl || 0);
  return Math.max(0, (intlPerMonth || 0) - free) * costPer;
}

// fxVolume is in thousands of DKK. fx_fee string contains the % markup
// (e.g. "0,5%", "1,17% EU / 1,99% øvrige" — uses the first %, i.e. the EU rate).
function fxMonthlyCost(pkg, fxVolume) {
  const s = pkg.fx_fee ||'';
  const m = s.match(/([\d,]+)\s*%/);
  if (!m) return 0;
  const pct = parseFloat(m[1].replace(',','.')) / 100;
  return (fxVolume || 0) * 1000 * pct;
}

// Returns detailed cost breakdown for charts. `year` (1 or 2) picks the
// corresponding endpoint of every range slider so Year 2 reflects the user's
// projected scale, not the average. Defaults to year 1 for compatibility.
function computeCostBreakdown(pkg, answers, year) {
  const y = year === 2 ? 2 : 1;
  const { needsPayroll } = answers;
  const txMonth = valueForYear(answers.txMonth, y);
  const intlPerMonth = answers.intlPerMonth || 0;
  const fxVolume = answers.fxVolume || 0;
  const onboarding = parseKr(pkg.onboarding);
  const monthly = parseKr(pkg.monthly) * 12;
  const domesticTx = Math.round(domesticMonthlyTxCost(pkg, txMonth) * 12);
  const intlTx = Math.round(intlMonthlyTxCost(pkg, intlPerMonth) * 12);
  const fx = Math.round(fxMonthlyCost(pkg, fxVolume) * 12);
  const card = parseKr(pkg.card_fee);
  const payroll = needsPayroll ? parseKr(pkg.payroll) * 3 * 12 : 0;
  const annual = Math.round(monthly + domesticTx + intlTx + fx + card + payroll);
  return { onboarding, monthly, domesticTx, intlTx, fx, card, payroll, annual };
}

function fmtKr(n) {
  return n.toLocaleString('da-DK').replace(/,/g,'.') +' kr';
}

// Compute per-row monthly cost (DKK) given slider answers. Returns null if not applicable.
function computeRowMonthlyCost(rowId, pkg, answers) {
  switch (rowId) {
    case'domestic_included': {
      return Math.round(domesticMonthlyTxCost(pkg, answers.txMonth || 0));
    }
    case'intl_transfer': {
      const s = pkg.intl_transfer ||'';
      if (/forhandlet/i.test(s)) return null;
      return Math.round(intlMonthlyTxCost(pkg, answers.intlPerMonth || 0));
    }
    case'fx_fee': {
      return Math.round(fxMonthlyCost(pkg, answers.fxVolume || 0));
    }
    case'payroll': {
      const perP = parseKr(pkg.payroll);
      return Math.round((answers.payrollPerMo || 0) * perP);
    }
    case'physical_card_extra': {
      const s = pkg.physical_card_extra ||'';
      if (/ubegrænset/i.test(s)) return 0;
      const inclM = s.match(/^(\d+)\s*inkl/i);
      const included = inclM ? parseInt(inclM[1]) : 0;
      const extra = Math.max(0, (answers.physCardsNeeded || 1) - included);
      const yearM = s.match(/([\d.]+)\s*kr\/år/i);
      if (yearM) return Math.round(extra * parseFloat(yearM[1].replace('.','')) / 12);
      const stkM = s.match(/([\d]+)\s*kr\/stk/i) || s.match(/([\d]+)\s*kr\s*\(engang\)/i);
      if (stkM) return Math.round(extra * parseInt(stkM[1]) / 12);
      return 0;
    }
    default:
      return null;
  }
}

// Currency conversion (all base prices stored as DKK)
const CURRENCIES = [
  { code:'DKK', symbol:'kr', rate: 1,      locale:'da-DK', prefix: false, flag:'DK', name:'Danish krone'},
  { code:'SEK', symbol:'kr', rate: 1.55,   locale:'sv-SE', prefix: false, flag:'SE', name:'Swedish krona'},
  { code:'NOK', symbol:'kr', rate: 1.60,   locale:'nb-NO', prefix: false, flag:'NO', name:'Norwegian krone'},
  { code:'EUR', symbol:'€',  rate: 0.134,  locale:'de-DE', prefix: true,  flag:'EU', name:'Euro'},
];
const CURRENCY_BY_CODE = Object.fromEntries(CURRENCIES.map(c => [c.code, c]));
const DEFAULT_CURRENCY ='DKK';

function fmtMoney(dkkAmount, code) {
  const c = CURRENCY_BY_CODE[code] || CURRENCY_BY_CODE[DEFAULT_CURRENCY];
  const converted = dkkAmount * c.rate;
  const rounded = Math.round(converted);
  const formatted = rounded.toLocaleString(c.locale);
  return c.prefix ? `${c.symbol}${formatted}` : `${formatted} ${c.symbol}`;
}

// Number-only variant — used in the comparison table/chart where the currency header
// is already indicated once (via the currency picker).
function fmtMoneyPlain(dkkAmount, code) {
  const c = CURRENCY_BY_CODE[code] || CURRENCY_BY_CODE[DEFAULT_CURRENCY];
  const converted = dkkAmount * c.rate;
  // Preserve up to 2 decimal places if the source value has them (e.g. "1,25 kr/stk"
  // must stay as "1,25 kr", not get rounded to "1 kr"). Integers stay clean.
  return converted.toLocaleString(c.locale, {
    minimumFractionDigits: 0,
    maximumFractionDigits: 2,
  });
}

// ─── Conclusion Bar ──────────────────────────────────────────────────────────
// Build a short, human-readable list of reasons for why this package is the recommended one.
// Each reason is grounded in one of the user's answers and the package's actual fields.
function buildRecommendationReasons(bank, pkg, answers, t) {
  const reasons = [];
  // Cost framing
  const txMonthY2 = valueForYear(answers.txMonth, 2);
  if (pkg._monthly === 0) reasons.push(t.reason_no_monthly ||'Zero monthly fee');
  else if (pkg._monthly <= 150) reasons.push(t.reason_low_monthly ||'Low monthly subscription');
  if (pkg._transfer === 0 && txMonthY2 > 30) reasons.push(t.reason_free_transfers ||'Free domestic transfers cover your volume');
  // International
  if (answers.needsIntl && pkg._intl === 0) reasons.push(t.reason_free_intl ||'Free international transfers as you requested');
  if (answers.needsIntl && pkg._intl > 0 && pkg._intl <= 30) reasons.push(t.reason_low_intl ||'Low SWIFT fees on the international transfers you need');
  // Branch
  if (answers.needsBranch && pkg._hasBranch) reasons.push(t.reason_branch ||'Physical branch / advisor matches your preference');
  if (!answers.needsBranch && !pkg._hasBranch) reasons.push(t.reason_digital ||'Fully digital — no branch overhead');
  // API
  if (answers.needsApi && pkg._hasApi) reasons.push(t.reason_api ||'Accounting / API integrations included');
  // Payroll
  if (answers.needsPayroll && pkg.payroll && pkg.payroll !=='—') reasons.push(t.reason_payroll ||'Payroll handling supported');
  // MobilePay/Swish/Vipps
  if (pkg._hasMobilePay) reasons.push(t.reason_mobilepay ||'Local mobile payments supported');
  // Killer features
  if (Array.isArray(pkg.killer_features) && pkg.killer_features.length) {
    const top = pkg.killer_features.slice(0, 2).map(f => f.label).join(',');
    reasons.push((t.reason_perks || 'Standout perks') +': '+ top);
  }
  // Cap to keep it tight
  return reasons.slice(0, 5);
}

// Build a richer recommendation narrative with three sections:
// 1. why-this-pick prose, 2. primary cost drivers, 3. when-to-reconsider with a concrete alternative.
function buildRichNarrative({ top, results, answers, currency, t }) {
  const { bank, pkg } = top;
  const reasons = buildRecommendationReasons(bank, pkg, answers, t);

  // Cost drivers — pick the largest non-zero line items from Year 2 breakdown.
  const breakdown = computeCostBreakdown(pkg, answers, 2);
  const driverDefs = [
    { key:'monthly',    amount: breakdown.monthly,    label: (t.chartCatMonthly    ||'Monthly fee').toLowerCase() },
    { key:'domesticTx', amount: breakdown.domesticTx, label: (t.chartCatDomestic   ||'Domestic transfers').toLowerCase() },
    { key:'intlTx',     amount: breakdown.intlTx,     label: (t.chartCatIntl       ||'International transfers').toLowerCase() },
    { key:'fx',         amount: breakdown.fx,         label: (t.chartCatFx         ||'FX markup').toLowerCase() },
    { key:'card',       amount: breakdown.card,       label: (t.chartCatCard       ||'Cards').toLowerCase() },
    { key:'payroll',    amount: breakdown.payroll,    label: (t.chartCatPayroll    ||'Payroll').toLowerCase() },
  ].filter(d => d.amount > 0).sort((a, b) => b.amount - a.amount);
  const totalAnnual = breakdown.annual || 1;

  // Alternative recommendation = highest-scoring entry that isn't this exact (bank, pkg).
  const alt = (results || []).find(r => !(r.bank.id === bank.id && r.pkg.name === pkg.name));

  // Year-2 transaction projection (the upper end of the slider).
  const txY2 = valueForYear(answers.txMonth, 2);

  // ─── Why this pick (prose) ───────────────────────────────────────────────
  let whyThisPick ='';
  if (reasons.length) {
    const sentences = reasons.map(r => r.replace(/\.+$/,'') +'.');
    whyThisPick = `${bank.name} ${pkg.name} ${t.fitsBecause ||'fits because'} ${sentences[0].charAt(0).toLowerCase() + sentences[0].slice(1)} ${sentences.slice(1).join('')}`;
  } else {
    whyThisPick = `${bank.name} ${pkg.name} ${t.scoredHighest || 'scored highest given your inputs.'}`;
  }

  // ─── Cost drivers (prose) ────────────────────────────────────────────────
  let costDrivers ='';
  if (driverDefs.length) {
    const top1 = driverDefs[0];
    const top1Pct = Math.round((top1.amount / totalAnnual) * 100);
    const driverIntro = (t.driverIntro ||'The biggest cost line is the').replace('{label}', top1.label);
    costDrivers = `${driverIntro} ${top1.label} at ${fmtMoney(top1.amount, currency)}/yr (${top1Pct}% ${t.ofTotal ||'of total'}).`;
    if (driverDefs.length > 1) {
      const others = driverDefs.slice(1, 3).map(d => `${d.label} (${fmtMoney(d.amount, currency)})`);
      costDrivers += ` ${t.followedBy ||'Followed by'} ${others.join(',')}.`;
    }
    if (top1.key === 'monthly'&& pkg._transfer === 0) {
      costDrivers += ` ${t.fixedNotPerTx ||'Costs are mostly fixed — they do not grow much with transaction volume.'}`;
    } else if (top1.key ==='domesticTx') {
      costDrivers += ` ${t.scalesWithTx ||'This grows directly with your transaction volume — watch this line if you expect to scale.'}`;
    }
  }

  // ─── When to reconsider (prose) ──────────────────────────────────────────
  const watchOuts = [];
  // International
  if (!answers.needsIntl) {
    const altWithFreeIntl = (results || []).find(r => r.pkg._intl === 0 && r.bank.id !== bank.id);
    if (altWithFreeIntl && pkg._intl > 30) {
      watchOuts.push(`${t.if_start_intl ||'if you start needing regular international transfers'}, ${altWithFreeIntl.bank.name} ${altWithFreeIntl.pkg.name} ${t.would_be_better ||'would be a better fit'} (${t.because_free_intl ||'free SWIFT transfers included'})`);
    }
  }
  // Branch
  if (!answers.needsBranch && pkg._hasBranch && alt && !alt.pkg._hasBranch && alt.pkg._monthly < pkg._monthly) {
    const saving = (pkg._monthly - alt.pkg._monthly) * 12;
    watchOuts.push(`${t.if_skip_branch ||'if branch access matters less to you'}, ${alt.bank.name} ${alt.pkg.name} ${t.would_save ||'would save'} ${fmtMoney(saving, currency)}/yr (${t.fully_digital_lc ||'fully digital'})`);
  }
  // Scale (transactions blow past plan's free quota)
  if (pkg._transfer > 0 && txY2 > 50) {
    const altWithIncluded = (results || []).find(r => r.pkg._transfer === 0 && r.bank.id !== bank.id);
    if (altWithIncluded) {
      watchOuts.push(`${t.if_scale_to ||'if your monthly transactions scale beyond'} ${Math.round(txY2 * 1.5)}, ${altWithIncluded.bank.name} ${altWithIncluded.pkg.name} ${t.becomes_cheaper ||'becomes cheaper'} (${t.tx_included ||'transactions included in monthly fee'})`);
    }
  }
  // API needs developing
  if (!answers.needsApi && !pkg._hasApi) {
    const altWithApi = (results || []).find(r => r.pkg._hasApi && r.bank.id !== bank.id);
    if (altWithApi) {
      watchOuts.push(`${t.if_need_api ||'if you decide to integrate accounting / API'}, ${altWithApi.bank.name} ${altWithApi.pkg.name} ${t.has_api ||'has that built-in'}`);
    }
  }

  let whenReconsider ='';
  if (watchOuts.length) {
    whenReconsider = `${t.thisRightFor ||'This is the right pick for your current profile'} — ${t.butIf ||'but'} ${watchOuts.slice(0, 3).join(';')}.`;
  } else if (alt) {
    whenReconsider = `${t.runnerUp || 'Closest alternative is'} ${alt.bank.name} ${alt.pkg.name} ${t.scoringBelow ||'which scored just below this one — keep it on your radar.'}`;
  }

  return { whyThisPick, costDrivers, whenReconsider };
}

function ConclusionBar({ top, results, answers, t, currency, lang }) {
  if (!top) return null;
  const { bank, pkg } = top;
  const onboarding = parseKr(pkg.onboarding);
  const annualY1 = computeAnnualCost(pkg, answers, 1);
  const annualY2 = computeAnnualCost(pkg, answers, 2);
  const y1 = onboarding + annualY1;
  const y2 = y1 + annualY2;
  const narrative = buildRichNarrative({ top, results, answers, currency, t });
  const localize = s => localizeCellValue(s, lang);

  return (
    <div className="conclusion">
      <div className="conclusion-headline">
        <BankLogo bank={bank} size={44}/>
        <div className="conclusion-text-wrap">
          <div className="conclusion-eyebrow">{t.recommendedFor}</div>
          <div className="conclusion-title"><strong>{bank.name} — {pkg.name}</strong> {t.bestChoice}</div>
        </div>
      </div>
      <div className="conclusion-narrative-box">
        {narrative.whyThisPick && (
          <div className="narrative-section">
            <div className="narrative-label">{t.whyThisPick ||'Why this pick'}</div>
            <p className="narrative-text">{localize(narrative.whyThisPick)}</p>
          </div>
        )}
        {narrative.costDrivers && (
          <div className="narrative-section">
            <div className="narrative-label">{t.primaryCostDrivers ||'Primary cost drivers'}</div>
            <p className="narrative-text">{localize(narrative.costDrivers)}</p>
          </div>
        )}
        {narrative.whenReconsider && (
          <div className="narrative-section">
            <div className="narrative-label">{t.whenToReconsider ||'When to reconsider'}</div>
            <p className="narrative-text">{localize(narrative.whenReconsider)}</p>
          </div>
        )}
      </div>
      <div className="conclusion-costs">
        <div className="cost-card onboarding">
          <span className="cost-label">{t.onboarding}</span>
          <span className="cost-value">{fmtMoney(onboarding, currency)}</span>
          <span className="cost-sub">{t.oneTime}</span>
        </div>
        <div className="cost-card year-1">
          <span className="cost-label">{t.year1}</span>
          <span className="cost-value">{fmtMoney(y1, currency)}</span>
          <span className="cost-sub">{t.inclOnboarding}</span>
        </div>
        <div className="cost-card">
          <span className="cost-label">{t.year2}</span>
          <span className="cost-value">{fmtMoney(y2, currency)}</span>
          <span className="cost-sub">{t.accumulated}</span>
        </div>
      </div>
    </div>
  );
}

// ─── Business Section ──────────────────────────────────────────────────────────
function BusinessSection({ business, setBusiness, t }) {
  const [cvrInput, setCvrInput] = useState(business.cvr ||'');
  const [loading, setLoading] = useState(false);
  const [notFound, setNotFound] = useState(false);

  const doLookup = async () => {
    if (!cvrInput.trim()) return;
    setLoading(true); setNotFound(false);
    const res = await mockCvrLookup(cvrInput);
    setLoading(false);
    if (res) {
      setBusiness({ ...business, cvr: cvrInput, company: res });
      setNotFound(false);
    } else {
      setNotFound(true);
      setBusiness({ ...business, cvr: cvrInput, company: null });
    }
  };

  const clear = () => {
    setCvrInput(''); setNotFound(false);
    setBusiness({ ...business, cvr:'', company: null });
  };

  return (
    <div className="biz-section">
      <label className="quiz-q-label" style={{marginBottom:8, display:'block'}}>{t.bizType}</label>
      <div className="biz-seg">
        <button className={`biz-seg-btn ${business.type==='existing'?'active':''}`}
          onClick={() => setBusiness({ ...business, type:'existing' })}>{t.existing}</button>
        <button className={`biz-seg-btn ${business.type==='new'?'active':''}`}
          onClick={() => setBusiness({ ...business, type:'new', cvr:'', company: null })}>{t.starting}</button>
      </div>

      {business.type ==='existing' && (
        <>
          <label className="quiz-q-label" style={{fontSize:12, marginTop:6, marginBottom:6, display:'block'}}>{t.cvrLabel}</label>
          <div className="cvr-input-wrap">
            <input className="cvr-input" type="text"
              value={cvrInput}
              onChange={e => setCvrInput(e.target.value)}
              onKeyDown={e => e.key ==='Enter' && doLookup()}
              placeholder={t.cvrPlaceholder}
              disabled={loading} />
            <button className="cvr-btn" onClick={doLookup}
              disabled={loading || !cvrInput.trim()}>{t.lookup}</button>
          </div>
          {loading && <div className="cvr-status"><span className="cvr-loader"></span> {t.cvrLoading}</div>}
          {notFound && <div className="cvr-status" style={{color:'#C85A3E'}}>{t.cvrNotFound}</div>}
          {!business.company && !loading && !notFound && (
            <div className="cvr-hint">{t.cvrHint} <span style={{color:'var(--accent)'}}>Prøv: 12345678, 87654321</span></div>
          )}
          {business.company && (
            <div className="cvr-card">
              <div className="cvr-card-top">
                <div className="cvr-company-name">{business.company.name}</div>
                <button className="cvr-clear" onClick={clear} title={t.btnClear}>×</button>
              </div>
              <span className="cvr-industry-tag">{business.company.tag}</span>
              <div className="cvr-meta">
                <span className="cvr-meta-label">{t.industryCode}</span>
                <span className="cvr-meta-val">{business.company.industryCode} · {business.company.industry}</span>
                <span className="cvr-meta-label">{t.employees}</span>
                <span className="cvr-meta-val">{business.company.employees}</span>
                <span className="cvr-meta-label">{t.founded}</span>
                <span className="cvr-meta-val">{business.company.founded}</span>
                <span className="cvr-meta-label">{t.revenue}</span>
                <span className="cvr-meta-val">{business.company.revenue}</span>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ─── Quiz Panel ──────────────────────────────────────────────────────────────
function QuizPanel({ answers, setAnswers, results, topScore, onHighlight, t, business, setBusiness, onLaunchWizard }) {
  const set = (k, v) => setAnswers(a => ({ ...a, [k]: v }));
  const rangeQ = (key, label, sub, min, max, step, unit) => {
    const val = answers[key];
    const range = Array.isArray(val) ? val : [val, val];
    const [lo, hi] = range;
    const pct = v => ((v - min) / (max - min)) * 100;
    const setLo = e => { const v = Math.min(+e.target.value, hi - step); set(key, [v, hi]); };
    const setHi = e => { const v = Math.max(+e.target.value, lo + step); set(key, [lo, v]); };
    return (
      <div className="quiz-q">
        <label className="quiz-q-label">{label}</label>
        {sub && <span className="quiz-q-sub">{sub}</span>}
        <div className="dual-range-wrap">
          <div className="dual-range-track">
            <div className="dual-range-fill" style={{left: pct(lo)+'%', right: (100-pct(hi))+'%'}}/>
          </div>
          <input type="range" className="dual-range-input" min={min} max={max} step={step}
            value={lo} onChange={setLo}/>
          <input type="range" className="dual-range-input" min={min} max={max} step={step}
            value={hi} onChange={setHi}/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:11,color:'var(--muted)'}}>
          <span><strong style={{color:'var(--text)'}}>{t.yearOneLabel ||'Y1'}:</strong> {lo} {unit}</span>
          <span><strong style={{color:'var(--text)'}}>{t.yearTwoLabel ||'Y2'}:</strong> {hi} {unit}</span>
        </div>
      </div>
    );
  };
  const toggleQ = (key, label, opts) => (
    <div className="quiz-q">
      <label className="quiz-q-label">{label}</label>
      <div className="quiz-toggle">
        {opts.map(([v, l]) => (

            onClick={() => set(key, v)}>{l}</button>
        ))}
      </div>
    </div>
  );
  return (
    <div className="quiz-inner">
      <div className="quiz-title">{t.quizTitle}</div>
      <div className="quiz-sub">{t.quizSub}</div>

      <button className="quiz-cta" onClick={onLaunchWizard}>

      <BusinessSection business={business} setBusiness={setBusiness} t={t} />

      <div className="quiz-section">
        <div className="quiz-section-title">{t.sectionVolume ||'Volume & budget'}</div>
        {rangeQ('txMonth', t.txMonth, t.txMonthSub, 0, 1000, 25, t.pcs)}
        {rangeQ('adb', t.adbQ, null, 0, 3000, 50, t.kDkk)}
      </div>

      <div className="quiz-section">
        <div className="quiz-section-title">{t.sectionCompany ||'Company size'}</div>
        {rangeQ('revenueNow', t.revenueNowQ, null, 0, 100, 1, t.mDkk)}
        {rangeQ('revenueNext', t.revenueNextQ, null, 0, 100, 1, t.mDkk)}
        {rangeQ('fte', t.fteQ, null, 0, 50, 1,'FTE')}
      </div>

      <div className="quiz-section">
        <div className="quiz-section-title">{t.sectionNeeds ||'What you need'}</div>
        {toggleQ('needsIntl', t.intlQ, [[false, t.no], [true, t.yesReg]])}
        {rangeQ('fxVolume', t.fxVolumeQ, null, 0, 500, 10, `${t.kDkk}/md`)}
        {toggleQ('needsBranch', t.branchQ, [[false, t.noDigital], [true, t.yesImp]])}
        {toggleQ('needsApi', t.apiQ, [[false, t.notNeeded], [true, t.yesImp]])}
        {toggleQ('needsPayroll', t.payrollQ, [[false, t.noEmp], [true, t.yesPay]])}
        <div className="quiz-q">
          <label className="quiz-q-label">{t.cashIntensiveQ}</label>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>

              <button key={k} className={`quiz-toggle-btn ${answers.cashIntensive===k?'active':''}`}
                style={{flex:'none',padding:'6px 12px'}}

            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function WizardModal({ answers, setAnswers, onClose, t }) {
  const steps = React.useMemo(() => WIZARD_STEPS(t), [t]);
  const [idx, setIdx] = React.useState(0);
  const step = steps[idx];
  const set = (k, v) => setAnswers(a => ({ ...a, [k]: v }));
  const current = answers[step.key];
  const isLast = idx === steps.length - 1;
  const next = () => { if (isLast) onClose(); else setIdx(i => Math.min(i + 1, steps.length - 1)); };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="wizard-modal" onClick={e => e.stopPropagation()} style={{position:'relative'}}>
        <button className="wizard-close" onClick={onClose} aria-label={t.btnClose}>×</button>
        <div className="wizard-head">
          <div className="wizard-progress">
            {steps.map((_, i) => (
              <div key={i} className={`wizard-progress-step ${i===idx?'active':''} ${i<idx?'done':''}`} />
            ))}
          </div>
          <div className="wizard-step-label">{t.wizardStep} {idx+1} {t.wizardOf} {steps.length}</div>
          <div className="wizard-q-title">{step.title}</div>
          {step.sub && <div className="wizard-q-sub">{step.sub}</div>}
        </div>
        <div className="wizard-body">
          {step.kind ==='options'&& (
            <div className="wizard-options">
              {step.options.map(opt => (
                <button key={String(opt.value)}
                  className={`wizard-option ${current === opt.value ?'active':''}`}
                  onClick={() => {
                    set(step.key, opt.value);
                    if (step.apply) step.apply(opt.value, set);
                    setTimeout(next, 180);
                  }}>
                  <span className="wizard-option-body">
                    <div className="wizard-option-label">{opt.label}</div>
                    {opt.hint && <div className="wizard-option-hint">{opt.hint}</div>}
                  </span>
                </button>
              ))}
            </div>
          )}
          {step.kind ==='slider' && (() => {
            const range = Array.isArray(current) ? current : [current ?? step.min, current ?? step.min];
            const [lo, hi] = range;
            const pct = v => ((v - step.min) / (step.max - step.min)) * 100;
            const setLo = e => { const v = Math.min(+e.target.value, hi - step.step); set(step.key, [v, hi]); };
            const setHi = e => { const v = Math.max(+e.target.value, lo + step.step); set(step.key, [lo, v]); };
            return (
              <div className="wizard-slider-wrap">
                <div className="wizard-slider-val" style={{display:'flex',justifyContent:'space-between',gap:24,fontSize:18}}>
                  <span><span style={{fontSize:11,fontWeight:700,letterSpacing:'.6px',color:'var(--muted)',display:'block',textTransform:'uppercase'}}>{t.yearOneLabel ||'Year 1'}</span>{lo} <span style={{fontSize:14,color:'var(--muted)',fontWeight:500}}>{step.unit}</span></span>
                  <span style={{textAlign:'right'}}><span style={{fontSize:11,fontWeight:700,letterSpacing:'.6px',color:'var(--muted)',display:'block',textTransform:'uppercase'}}>{t.yearTwoLabel ||'Year 2'}</span>{hi} <span style={{fontSize:14,color:'var(--muted)',fontWeight:500}}>{step.unit}</span></span>
                </div>
                <div className="dual-range-wrap" style={{margin:'12px 0 6px'}}>
                  <div className="dual-range-track">
                    <div className="dual-range-fill" style={{left: pct(lo)+'%', right: (100-pct(hi))+'%'}}/>
                  </div>
                  <input type="range" className="dual-range-input"
                    min={step.min} max={step.max} step={step.step}
                    value={lo} onChange={setLo} />
                  <input type="range" className="dual-range-input"
                    min={step.min} max={step.max} step={step.step}
                    value={hi} onChange={setHi} />
                </div>
                <div className="wizard-range-bounds">
                  <span>{step.min}</span>
                  <span>{step.max}+</span>
                </div>
                <div className="wizard-best-guess-hint" style={{marginTop:10,fontSize:12,color:'var(--muted)',fontStyle:'italic'}}>
                  {t.bestGuessHint || "It's hard to predict — your best guess is fine."}
                </div>
              </div>
            );
          })()}
        </div>
        <div className="wizard-foot">
          {idx > 0 && (
            <button className="wizard-btn wizard-btn-back" onClick={() => setIdx(i => Math.max(0, i-1))}>
              ← {t.wizardBack}
            </button>
          )}
          <button className="wizard-btn wizard-btn-next" onClick={next}>
            {isLast ? t.wizardDone : t.wizardNext +' →'}
          </button>
        </div>
      </div>
    </div>
  );
}

      next.delete('all');
      if (next.has(p)) { next.delete(p); if (!next.size) next.add('traffic'); }
      else { next.delete('traffic'); next.add(p); }
      return next;
    });

// ─── Updates Feed ────────────────────────────────────────────────────────────
// Filter buttons auto-derive from each update's `tagLabel` — adding a new update
// with a new tag automatically adds it to the filter row (sorted by frequency).
const UPDATE_TAG_LABELS = (() => {
  const counts = new Map();
  UPDATES.forEach(u => counts.set(u.tagLabel, (counts.get(u.tagLabel) || 0) + 1));
  return [...counts.entries()]
    .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
    .map(([tag]) => tag);
})();

function UpdatesFeed({ t }) {
  const [filter, setFilter] = useState('all');
  const [countryFilter, setCountryFilter] = useState('all');
  const [read, setRead] = useState(new Set());
  const [selected, setSelected] = useState(null);

  const filtered = UPDATES.filter(u =>
    (filter ==='all'|| u.tagLabel === filter) &&
    (countryFilter ==='all'|| u.country === countryFilter)
  );

  const categoryCount = (id) => UPDATES.filter(u =>
    (id ==='all'|| u.tagLabel === id) &&
    (countryFilter ==='all'|| u.country === countryFilter)
  ).length;
  const countryCount = (code) => UPDATES.filter(u =>
    (filter ==='all'|| u.tagLabel === filter) &&
    (code ==='all'|| u.country === code)
  ).length;

  const filters = [
    { id:'all', label: t.filterAll },
    ...UPDATE_TAG_LABELS.map(tag => ({ id: tag, label: tag })),
  ];
  const countries = [
    { code:'all', label: t.allNordic, flag:'ALL'},
    { code:'DK', label: t.country_DK, flag:'DK'},
    { code:'SE', label: t.country_SE, flag:'SE'},
    { code:'NO', label: t.country_NO, flag:'NO'},
    { code:'FI', label: t.country_FI, flag:'FI'},
  ];
  const days = [
    { id:'today', label: t.today },
    { id:'yesterday', label: t.yesterday },
    { id:'this-week', label: t.thisWeek },
    { id:'earlier', label: t.earlier },
  ];

  return (
    <div className="updates-wrap">
      <div className="updates-head">
        <div className="updates-title">{t.updatesTitle}</div>
        <div className="updates-sub">{t.updatesSub}</div>
      </div>
      <div className="updates-filters">
        {filters.map(f => (
          <button key={f.id} className={`updates-filter ${filter === f.id ?'active':''}`}
            onClick={() => setFilter(f.id)}>
            {f.label}<span className="updates-filter-count">{categoryCount(f.id)}</span>
          </button>
        ))}
      </div>
      <div className="updates-filters row-country">
        {countries.map(c => (
          <button key={c.code} className={`updates-filter ${countryFilter === c.code ?'active':''}`}
            onClick={() => setCountryFilter(c.code)}>
            <span style={{display:'inline-flex',alignItems:'center'}}><Flag code={c.flag} size={14}/></span>{c.label}<span className="updates-filter-count">{countryCount(c.code)}</span>
          </button>
        ))}
      </div>
      {days.map(d => {
        const items = filtered.filter(u => u.day === d.id);
        if (!items.length) return null;
        return (
          <div key={d.id} className="feed-day">
            <div className="feed-day-label">{d.label}</div>
            {items.map(u => {
              const isUnread = u.unread && !read.has(u.id);
              return (
                <div key={u.id} className={`feed-item ${isUnread ?'unread':''}`}
                  onClick={() => { setRead(r => new Set([...r, u.id])); setSelected(u); }}>
                  <div className="feed-icon" style={{background: u.color}}>{u.logo}</div>
                  <div className="feed-body">
                    <div className="feed-top">
                      <span className="feed-bank-name">{u.bank}</span>
                      <span className="feed-country">{u.country}</span>
                      <span className={`feed-tag ${u.type}`}>{u.tagLabel}</span>
                      <span className="feed-time">{u.time}</span>
                    </div>
                    <div className="feed-headline">{u.headline}</div>
                    <div className="feed-detail">{u.detail}</div>
                    {u.delta && (
                      <div className="feed-delta">
                        <span className="old-val">{u.delta.old}</span>
                        <span className={u.type ==='price-up'?'arrow-up':'arrow-down'}>
                          {u.type ==='price-up'?'↗':'↘'} {u.delta.new}
                        </span>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
      {selected && <UpdateDetailModal update={selected} t={t} onClose={() => setSelected(null)} />}
    </div>
  );
}

// ─── Cost Chart — stacked bars per package × year ──────────────────────────
const COST_CATS = [
  { key:'monthly',    labelKey:'chartCatMonthly',    color:'#D97757'},
  { key:'domesticTx', labelKey:'chartCatDomestic',   color:'#8B8659'},
  { key:'intlTx',     labelKey:'chartCatIntl',       color:'#6B8EAB'},
  { key:'fx',         labelKey:'chartCatFx',         color:'#7BA88B'},
  { key:'card',       labelKey:'chartCatCard',       color:'#A67BA6'},
  { key:'payroll',    labelKey:'chartCatPayroll',    color:'#C89B3E'},
  { key:'onboarding', labelKey:'chartCatOnboarding', color:'#3D3935' },
];

function CostChart({ columns, visibleBanks, answers, t, isBestForBank, currency }) {
  if (!columns || !columns.length) return null;

  // Keep only best-fit per bank (one bar group per bank)
  const bestCols = columns.filter(({ bank, pkg }) => isBestForBank(bank, pkg));

  // Build data for best-fit columns only — Y1 uses range[0], Y2 uses range[1]
  const items = bestCols.map(({ bank, pkg }) => {
    const breakdownByYear = [computeCostBreakdown(pkg, answers, 1), computeCostBreakdown(pkg, answers, 2)];
    const yearSlice = (yearIdx) => {
      const b = breakdownByYear[yearIdx];
      return {
        onboarding: yearIdx === 0 ? b.onboarding : 0,
        monthly:    b.monthly,
        domesticTx: b.domesticTx,
        intlTx:     b.intlTx,
        fx:         b.fx,
        card:       b.card,
        payroll:    b.payroll,
      };
    };
    const years = [0,1].map(i => {
      const slice = yearSlice(i);
      const total = COST_CATS.reduce((s,c) => s + slice[c.key], 0);
      return { slice, total };
    });
    return { bank, pkg, years };
  });

  // Measure bank header widths AND the left label column so chart aligns with the table.
  const [bankWidths, setBankWidths] = React.useState({});
  const [labelWidth, setLabelWidth] = React.useState(200);
  React.useEffect(() => {
    const measure = () => {
      const widths = {};
      visibleBanks.forEach(bank => {
        const th = document.querySelector(`[data-bank-col="${bank.id}"]`);
        if (th) widths[bank.id] = th.getBoundingClientRect().width;
      });
      setBankWidths(widths);
      const lab = document.querySelector('.th-label-top');
      if (lab) setLabelWidth(lab.getBoundingClientRect().width);
    };
    measure();
    // Re-measure on resize or layout changes
    const ro = new ResizeObserver(measure);
    document.querySelectorAll('[data-bank-col], .th-label-top').forEach(el => ro.observe(el));
    window.addEventListener('resize', measure);
    return () => { ro.disconnect(); window.removeEventListener('resize', measure); };
  }, [visibleBanks, columns.length]);

  // Global max across all bars for consistent scaling
  const maxTotal = Math.max(1, ...items.flatMap(it => it.years.map(y => y.total)));
  const chartH = 180;

  return (
    <div className="cost-chart">
      <div className="cost-chart-head" style={{paddingLeft: labelWidth}}>
        <div className="cost-chart-title">{t.chartTitle ||'2-year cost breakdown'}</div>
        <div className="cost-chart-sub">{t.chartSub ||'Best-fit plan per bank · stacked by category'}</div>
      </div>
      <div className="cost-chart-legend" style={{paddingLeft: labelWidth}}>
        {COST_CATS.map(c => (
          <div key={c.key} className="legend-item">
            <span className="legend-swatch" style={{background: c.color}}></span>
            <span>{t[c.labelKey] || c.key}</span>
          </div>
        ))}
      </div>
      <div className="cost-chart-rail">
        <div className="cost-chart-row" style={{paddingLeft: labelWidth}}>
          {items.map(({ bank, pkg, years }) => {
            const w = bankWidths[bank.id];
            return (
              <div key={bank.id} className="chart-col chart-col-best"
                style={w ? {width: w, flex: `0 0 ${w}px`} : {flex:'1 1 200px'}}>
                <div className="chart-bars">
                  {years.map((y, yi) => {
                    const h = (y.total / maxTotal) * chartH;
                    return (
                      <div key={yi} className="chart-bar-wrap">
                        <div className="chart-bar-total">{fmtMoneyPlain(y.total, currency)}</div>
                        <div className="chart-bar" style={{height: chartH}}>
                          <div className="chart-bar-fill" style={{height: h}}>
                            {COST_CATS.map(c => {
                              const v = y.slice[c.key];
                              if (!v) return null;
                              const segH = (v / y.total) * h;
                              return (
                                <div key={c.key} className="chart-seg"
                                  style={{height: segH, background: c.color}}
                                  title={`${t[c.labelKey] || c.key}: ${fmtMoneyPlain(v, currency)}`} />
                              );
                            })}
                          </div>
                        </div>
                        <div className="chart-bar-label">Y{yi+1}</div>
                      </div>
                    );
                  })}
                </div>
                <div className="chart-col-foot">
                  <BankLogo bank={bank} size={20}/>
                  <div className="chart-col-names">
                    <div className="chart-col-bank">{bank.name}</div>
                    <div className="chart-col-pkg">{pkg.name}</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── Main App ────────────────────────────────────────────────────────────────
// A cell pulses if pkg._changes[rowId] is within the last PULSE_WINDOW_DAYS.
// `_changes[rowId]` accepts two shapes:
//   -'YYYY-MM-DD'(timestamp only — pulses, not clickable)
//   - { date:'YYYY-MM-DD', updateId: 13 }    (links to UPDATES entry — pulses + clickable)
// The "Refresh Bank Pickr data" routine writes the object form so each pulsing cell
// links back to the Updates feed entry it generated.
const PULSE_WINDOW_DAYS = 14;
const PULSE_WINDOW_MS = PULSE_WINDOW_DAYS * 24 * 60 * 60 * 1000;
function getCellChange(pkg, rowId) {
  const raw = pkg && pkg._changes && pkg._changes[rowId];
  if (!raw) return null;
  const date = typeof raw ==='string'? raw : raw.date;
  const updateId = typeof raw ==='object' && raw !== null ? raw.updateId : null;
  if (!date) return null;
  const t = new Date(date).getTime();
  if (Number.isNaN(t)) return null;
  if (Date.now() - t > PULSE_WINDOW_MS) return null;
  return { date, updateId };
}
function isCellPulsing(pkg, rowId) {
  return !!getCellChange(pkg, rowId);
}

function App() {
  const [country, setCountry] = useState(() => {
    try { return localStorage.getItem('bp-country') || TWEAK_DEFAULTS.defaultCountry ||'DK'; } catch { return TWEAK_DEFAULTS.defaultCountry ||'DK'; }
  });
  const [lang, setLang] = useState(() => {
    try {
      const saved = localStorage.getItem('bp-lang');
      if (saved && TRANSLATIONS[saved]) return saved;
    } catch {}
    return TWEAK_DEFAULTS.language ||'en';
  });
  const [langOpen, setLangOpen] = useState(false);
  const [currency, setCurrency] = useState(() => {
    try { return localStorage.getItem('bp-currency') || DEFAULT_CURRENCY; } catch { return DEFAULT_CURRENCY; }
  });
  const [currencyOpen, setCurrencyOpen] = useState(false);
  const langRef = React.useRef(null);
  const currencyRef = React.useRef(null);
  React.useEffect(() => { try { localStorage.setItem('bp-currency', currency); } catch {} }, [currency]);
  React.useEffect(() => { try { localStorage.setItem('bp-country', country); } catch {} }, [country]);
  React.useEffect(() => { try { localStorage.setItem('bp-lang', lang); } catch {} }, [lang]);
  React.useEffect(() => {
    if (!langOpen && !currencyOpen) return;
    const onDown = e => {
      if (langOpen && langRef.current && !langRef.current.contains(e.target)) setLangOpen(false);
      if (currencyOpen && currencyRef.current && !currencyRef.current.contains(e.target)) setCurrencyOpen(false);
    };
    document.addEventListener('mousedown', onDown);
    return () => document.removeEventListener('mousedown', onDown);
  }, [langOpen, currencyOpen]);
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('bp-theme') || TWEAK_DEFAULTS.theme ||'light'; } catch { return TWEAK_DEFAULTS.theme ||'light'; }
  });
  React.useEffect(() => { try { localStorage.setItem('bp-theme', theme); } catch {} }, [theme]);
  const t = TRANSLATIONS[lang];
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.setAttribute('lang', lang);
  }, [theme, lang]);
  const [visibleIds, setVisibleIds] = useState(['danske','nordea','revolut','lunar','nykredit']);
  // When country changes, default to showing every bank that operates there
  React.useEffect(() => {
    const banks = COUNTRY_BANKS[country] || [];
    setVisibleIds(banks.map(b => b.id));
  }, [country]);
  const [addModal, setAddModal] = useState(false);
  const [wizardOpen, setWizardOpen] = useState(false);
  const [viewMode, setViewMode] = useState(() => {
    try { return localStorage.getItem('bp-viewMode') ||'summary'; } catch { return'summary'; }
  });
  React.useEffect(() => { try { localStorage.setItem('bp-viewMode', viewMode); } catch {} }, [viewMode]);
  const [highlighted, setHighlighted] = useState(null);
  // When a pulsing cell is clicked, the matching UPDATES entry opens in the same modal as the Updates feed.
  const [cellSelectedUpdate, setCellSelectedUpdate] = useState(null);
  const [answers, setAnswers] = useState({
    txMonth: 60, intlPerMonth: 0, fxVolume: 0, needsIntl: false, needsBranch: false,
    needsApi: false, needsPayroll: false, payrollPerMo: 0, physCardsNeeded: 1, virtCardsNeeded: 0, priority:'pris',
    revenueNow: [10, 25], revenueNext: [15, 30], fte: [3, 10], adb: [100, 600],
    cashIntensive:'none', subsidiaries:'standalone', industryRisk:'standard',
  });
  const [business, setBusiness] = useState({ type:'new', cvr:'', company: null });

  const allBanks = COUNTRY_BANKS[country] || COUNTRY_BANKS['DK'];
  // Merge detailed overrides into packages so cells resolve in detailed view
  const allBanksEnriched = useMemo(() => {
    if (typeof DETAIL_OVERRIDES ==='undefined') return allBanks;
    return allBanks.map(bank => {
      const overrides = DETAIL_OVERRIDES[bank.id];
      if (!overrides) return bank;
      return {
        ...bank,
        packages: bank.packages.map(pkg => {
          const ov = overrides[pkg.name];
          return ov ? { ...pkg, ...ov } : pkg;
        }),
      };
    });
  }, [allBanks]);
  const visibleBanks = allBanksEnriched.filter(b => visibleIds.includes(b.id));
  // A country is "coming soon" only if its bank list is empty or all entries are placeholders
  const comingCountry = !COUNTRY_BANKS[country]?.length
    || COUNTRY_BANKS[country].every(b => b._placeholder);

  const toggleBank = id => {
    setVisibleIds(ids => ids.includes(id)
      ? ids.filter(i => i !== id)
      : [...ids, id]
    );
  };

  const handleHighlight = (bankId, pkgName) => {
    setHighlighted({ bankId, pkgName });
    setTimeout(() => setHighlighted(null), 3000);
  };

  // Compute quiz results at App level so conclusion bar can use the top result.
  // Summary view: rank by lowest Year-1 cost (price-driven). Detailed view: rank
  // by the detailed scoring algorithm (fit-driven).
  const results = useMemo(() => {
    const scored = [];
    visibleBanks.forEach(bank => {
      bank.packages.forEach(pkg => {
        const y1 = parseKr(pkg.onboarding) + computeAnnualCost(pkg, answers, 1);
        scored.push({ bank, pkg, score: scorePackageDetailed(pkg, bank, answers), y1 });
      });
    });
    const sorted = viewMode ==='summary'? scored.sort((a, b) => a.y1 - b.y1)         // cheapest first
      : scored.sort((a, b) => b.score - a.score);  // best-fit first
    return sorted.slice(0, 5);
  }, [visibleBanks, answers, viewMode]);
  const topScore = results[0]?.score || 100;
  const topResult = results[0];

  // Best package per bank: in summary view always pick cheapest; in detailed pick highest-scored
  const bestPerBank = useMemo(() => {
    const map = {};
    visibleBanks.forEach(bank => {
      let best = null;
      bank.packages.forEach(pkg => {
        const y1 = parseKr(pkg.onboarding) + computeAnnualCost(pkg, answers, 1);
        if (!best || y1 < best.y1) best = { pkg, y1 };
      });
      if (best) map[bank.id] = best.pkg.name;
    });
    return map;
  }, [visibleBanks, answers]);
  const isBestForBank = (bank, pkg) => bestPerBank[bank.id] === pkg.name;

  // Build column list: [{bank, pkg}]. In summary view, only show best-fit per bank.
  const columns = useMemo(() => {
    const cols = [];
    visibleBanks.forEach(bank => {
      bank.packages.forEach(pkg => {
        if (viewMode ==='summary'&& bestPerBank[bank.id] !== pkg.name) return;
        cols.push({ bank, pkg });
      });
    });
    return cols;
  }, [visibleBanks, viewMode, bestPerBank]);

  // For the bank header row, colSpan must match visible packages per bank in current view
  const visiblePkgCountFor = (bank) => {
    if (viewMode ==='summary') return bestPerBank[bank.id] ? 1 : 0;
    return bank.packages.length;
  };

  const isHighlighted = (bank, pkg) =>
    highlighted && highlighted.bankId === bank.id && highlighted.pkgName === pkg.name;

  return (
    <>
      {/* HEADER */}
      <header className="header">
        <div className="logo">Bankvalg<span>.dk</span></div>
        <div className="tagline">{t.tagline}</div>
        <div className="header-right">
          <div className="header-sep"></div>
          <div className="currency-dropdown lang-dropdown" ref={currencyRef}>
            <button className="currency-trigger"
              onClick={() => setCurrencyOpen(o => !o)}
              title={t.selectCurrency}
              aria-label={t.labelCurrency}>
              <svg className="currency-icon" viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="10" cy="10" r="8"/>
                <path d="M13 7.5c-.6-1-1.7-1.5-3-1.5-1.7 0-3 1-3 2.3 0 1.2.9 1.8 2.5 2.2l1 .2c1.6.4 2.5 1 2.5 2.2 0 1.3-1.3 2.3-3 2.3-1.3 0-2.4-.5-3-1.5"/>
                <path d="M10 4.5v11"/>
              </svg>
              <Flag code={CURRENCY_BY_CODE[currency]?.flag ||'DK'} size={14}/>
              {currency}
              <span className="currency-caret">▾</span>
            </button>
            {currencyOpen && (
              <div className="lang-menu">
                {CURRENCIES.map(c => (
                  <button key={c.code}
                    className={`lang-item ${currency === c.code ?'active':''}`}
                    onClick={() => { setCurrency(c.code); setCurrencyOpen(false); }}>
                    <span className="lang-item-flag"><Flag code={c.flag} size={16}/></span>
                    <span>{c.code}</span>
                  </button>
                ))}
              </div>
            )}
          </div>
          <div className="header-sep"></div>
          <div className="lang-dropdown" ref={langRef}>
            <button className="lang-trigger"
              onClick={() => setLangOpen(o => !o)}
              title={t.selectLanguage}>
              <Flag code={LANGUAGES.find(l => l.code === lang)?.flag ||'GB'} size={18}/>
            </button>
            {langOpen && (
              <div className="lang-menu">
                {LANGUAGES.map(l => (
                  <button key={l.code}
                    className={`lang-item ${lang === l.code ?'active':''}`}
                    onClick={() => { setLang(l.code); setLangOpen(false); }}>
                    <span className="lang-item-flag"><Flag code={l.flag} size={16}/></span>
                    <span>{l.name}</span>
                  </button>
                ))}
              </div>
            )}
          </div>
          <button className="icon-btn" onClick={() => setTheme(th => th==='dark'?'light':'dark')}
            title={theme==='dark'?'Light mode':'Dark mode'}
            aria-label={theme==='dark'?'Light mode':'Dark mode'}>
            {theme==='dark' ? (
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
              </svg>
            ) : (
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            )}
          </button>
        </div>
      </header>

      {/* CONTROLS */}
      <div className="controls">
        <div className="view-mode-toggle">
          <button
            className={`view-mode-btn ${viewMode==='summary'?'active':''}`}
            onClick={() => setViewMode('summary')}>
            {t.viewSummary}
          </button>
          <button
            className={`view-mode-btn ${viewMode==='detailed'?'active':''}`}
            onClick={() => setViewMode('detailed')}>
            {t.viewDetailed}
          </button>
        </div>
      </div>

      {/* MAIN */}
      <div className="main">
        <div className="table-area">
          {!comingCountry && <ConclusionBar top={topResult} results={results} answers={answers} t={t} currency={currency} lang={lang} />}
          {comingCountry ? (
            <div className="placeholder-msg">
              <div style={{fontWeight:600,fontSize:15,marginBottom:6}}>
                {COUNTRIES.find(c=>c.code===country)?.name} {t.comingSoon}
              </div>
              <div>{t.workingOn} {COUNTRIES.find(c=>c.code===country)?.name}.<br/>{t.tryDk}</div>
            </div>
          ) : (
          <>
          <table className="compare-table">
            <thead>
              {/* Row 1: Bank names */}
              <tr>
                <td className="th-label th-label-top" colSpan={2}>{t.pricingStruct}</td>
                {visibleBanks.map(bank => (
                  <th key={bank.id} colSpan={visiblePkgCountFor(bank)} className="th-bank" data-bank-col={bank.id}>
                    <div className="th-bank-inner" style={{borderTopColor: bank.color}}>
                      <BankLogo bank={bank} size={36}/>
                      <div className="bank-name" style={{marginTop:6}}>{bank.name}</div>
                      <div className="bank-pkg-count">{bank.packages.length} {t.packages}</div>
                    </div>
                  </th>
                ))}
              </tr>
              {/* Row 2: Package names */}
              <tr>
                <td className="th-label-pkg" colSpan={2}>{t.package}</td>
                {columns.map(({bank, pkg}, i) => {
                  const hl = isHighlighted(bank, pkg);
                  const best = isBestForBank(bank, pkg);
                  const showBest = best && !hl && viewMode ==='detailed';
                  const cls = `th-pkg ${hl ?'best-pkg':''} ${showBest ?'bank-best':''}`;
                  return (
                    <th key={bank.id+pkg.name} className={cls}
                      style={hl ? {background:'var(--green-light)',color:'var(--green)'} : {}}>
                      {pkg.name}
                      {hl && <div style={{fontSize:9,marginTop:2}}>{t.recommended ||'Anbefalet'}</div>}
                      {showBest && <div className="bank-best-badge">{t.bestFit ||'Best fit'}</div>}
                    </th>
                  );
                })}
              </tr>
              {/* Row 3: Price estimate — in thead so sticky works reliably */}
              {(() => {
                const costs = columns.map(({bank, pkg}) => {
                  const onb = parseKr(pkg.onboarding);
                  const annualY1 = computeAnnualCost(pkg, answers, 1);
                  return { bank, pkg, y1: onb + annualY1 };
                });
                const minY1 = Math.min(...costs.map(c => c.y1));
                const isWinner = c => c.y1 === minY1;
                return (<>
                  <tr className="price-section-row">
                    <td className="cat-spacer"></td>
                    <td className="price-sticky">{t.priceEstimate} <span style={{fontWeight:400, textTransform:'none', letterSpacing:0, fontSize:10, color:'var(--muted)', marginLeft:4}}>{t.priceSub}</span></td>
                    {columns.map(({bank, pkg}) => <td key={bank.id+pkg.name}></td>)}
                  </tr>
                  <tr className="price-row">
                    <td className="cat-spacer"></td>
                    <td className="row-label">
                      <div className="row-label-text">
                        <span className="price-icon">1</span>
                        {t.yr1Cost}
                      </div>
                    </td>
                    {costs.map(c => (
                      <td key={c.bank.id+c.pkg.name} className={isWinner(c) ?'winner-cell':''}
                        style={{
                          background: isWinner(c) ?'var(--accent)': undefined,
                          color: isWinner(c) ?'#fff': undefined,
                          fontWeight: isWinner(c) ? 700 : 600,
                        }}>
                        {fmtMoneyPlain(c.y1, currency)}
                      </td>
                    ))}
                  </tr>
                </>);
              })()}
            </thead>
            <tbody>
              {(viewMode ==='detailed'&& typeof ROW_GROUPS_DETAILED !=='undefined'? ROW_GROUPS_DETAILED
                : ROW_GROUPS
              ).map(group => (
                <React.Fragment key={group.id}>
                  {group.rows.map((row, idx) => (
                    <tr key={row.id} className={`data-row${idx === 0 ?' group-start':''}`}>
                      {idx === 0 && (
                        <td className="cat-cell" rowSpan={group.rows.length}>
                          <div className="cat-cell-text">{t.groupLabels[group.id] || group.label}</div>
                        </td>
                      )}
                      <td className="row-label">
                        <div className="row-label-text">
                          {t.rowLabels[row.id] || row.label}
                          {row.tooltip && <Tip text={(t.rowTooltips && t.rowTooltips[row.id]) || row.tooltip} />}
                        </div>
                        <InlineSlider rowId={row.id} answers={answers} setAnswers={setAnswers} />
                      </td>
                      {columns.map(({bank, pkg}) => {
                        const val = pkg[row.id];
                        const hl = isHighlighted(bank, pkg);
                        const isFeatureCell = row.id ==='killer_features';
                        const change = getCellChange(pkg, row.id);
                        const pulsing = !!change;
                        const updateId = change && change.updateId;
                        const update = updateId != null ? UPDATES.find(u => u.id === updateId) : null;
                        const cls = [
                          isFeatureCell &&'feature-cell',
                          pulsing &&'cell-pulse',
                          pulsing && update &&'cell-pulse-clickable',
                        ].filter(Boolean).join('');
                        const rowCost = ROW_SLIDER_CONFIG[row.id] ? computeRowMonthlyCost(row.id, pkg, answers) : null;
                        return (
                          <td key={bank.id+pkg.name}
                            className={cls || undefined}
                            style={hl ? {background:'var(--green-light)'} : {}}
                            onClick={update ? () => setCellSelectedUpdate(update) : undefined}
                            title={update ? update.headline : undefined}>
                            <CellVal val={val} currency={currency} sourceCurrency={COUNTRY_TO_CURRENCY[country]} lang={lang} />
                            {rowCost !== null && (
                              <div className="row-cost-est">
                                <span className={rowCost === 0 ?'cost-free':'cost-amt'}>
                                  {rowCost === 0 ?'0 kr/md': `~${rowCost} kr/md`}
                                </span>
                              </div>
                            )}
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </React.Fragment>
              ))}
            </tbody>
          </table>
          <CostChart columns={columns} visibleBanks={visibleBanks} answers={answers} t={t} isBestForBank={isBestForBank} currency={currency} />
          </>
          )}
        </div>

      </div>

      {/* NOTICE */}
      <div className="notice">
        <span>{t.notice1}</span>
        <span>{t.notice2}</span>
        <span>{t.notice3}</span>
        <span className="notice-updated" title={window.DATA_LAST_UPDATED ||''}>
          <span className="notice-updated-label">{t.lastUpdated ||'Data updated'}</span>
          {(() => {
            const raw = window.DATA_LAST_UPDATED;
            if (!raw) return'—';
            const d = new Date(raw);
            if (Number.isNaN(d.getTime())) return raw;
            return d.toLocaleString(t.locale || undefined, {
              year:'numeric', month:'short', day:'2-digit',
              hour:'2-digit', minute:'2-digit',
            });
          })()}
        </span>
      </div>

      {/* MODALS */}
      {addModal && (
        <AddBankModal
          visibleBankIds={visibleIds}
          onAdd={id => setVisibleIds(ids => [...ids, id])}
          onClose={() => setAddModal(false)}
          t={t}
        />
      )}
      {wizardOpen && (
        <WizardModal
          answers={answers}
          setAnswers={setAnswers}
          onClose={() => setWizardOpen(false)}
          t={t}
        />
      )}
      {cellSelectedUpdate && (
        <UpdateDetailModal
          update={cellSelectedUpdate}
          onClose={() => setCellSelectedUpdate(null)}
          t={t}
        />
      )}
    </>
  );
}

// Tweaks
window.addEventListener('message', e => {
  if (e.data?.type ==='__activate_edit_mode') document.getElementById('tweaks-panel').style.display ='flex';
  if (e.data?.type ==='__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display ='none';
});
window.parent.postMessage({ type:'__edit_mode_available'},'*');

(window.__dbReady || Promise.resolve()).then(() => {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
});
</script>
